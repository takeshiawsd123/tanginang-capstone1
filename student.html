<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <h2>Join Room</h2>
    <input id="studentName" placeholder="Your Name">
    <input id="roomCodeInput" placeholder="Room Code">
    <p id="errorMsg" class="error"></p>
    <button id="joinBtn" onclick="joinRoom()">Join</button>
    <div id="quiz"></div>
</div>
<script>
let questions = [];
let current = 0;
let score = 0;

async function joinRoom() {
    const name = document.getElementById("studentName").value.trim();
    const code = document.getElementById("roomCodeInput").value.trim();
    const errorMsg = document.getElementById("errorMsg");
    const btn = document.getElementById("joinBtn");

    errorMsg.textContent = "";

    if (!name || !code) {
        errorMsg.textContent = "Please fill in all fields.";
        return;
    }

    btn.textContent = "Joining...";
    btn.disabled = true;

    try {
        const joinData = new FormData();
        joinData.append("name", name);
        joinData.append("code", code);

        const joinRes = await fetch("join_room.php", { method: "POST", body: joinData });
        const joinText = await joinRes.text();

        if (joinText.trim() !== "Success") {
            errorMsg.textContent = joinText;
            return;
        }

        const qRes = await fetch(`get_questions.php?code=${encodeURIComponent(code)}`);
        const qData = await qRes.json();

        if (!qData.success) {
            errorMsg.textContent = qData.error || "Failed to load questions.";
            return;
        }

        questions = qData.questions;
        current = 0;
        score = 0;
        showQuestion();

    } catch (err) {
        errorMsg.textContent = "Network error. Please try again.";
    } finally {
        btn.textContent = "Join";
        btn.disabled = false;
    }
}

function showQuestion() {
    if (questions.length === 0) {
        document.getElementById("quiz").innerHTML = "<h3>No questions found</h3>";
        return;
    }

    if (current >= questions.length) {
        document.getElementById("quiz").innerHTML = `<h2>Finished! Score: ${score}/${questions.length}</h2>`;
        return;
    }

    let q = questions[current];

    document.getElementById("quiz").innerHTML = `
        <h3>${q.question}</h3>
        <button onclick="checkAnswer('A')">${q.option_a}</button>
        <button onclick="checkAnswer('B')">${q.option_b}</button>
        <button onclick="checkAnswer('C')">${q.option_c}</button>
        <button onclick="checkAnswer('D')">${q.option_d}</button>
    `;
}

function checkAnswer(choice) {
    if (choice === questions[current].correct_answer) {
        score++;
        alert("Correct!");
    } else {
        alert("Wrong!");
    }
    current++;
    showQuestion();
}
</script>
</body>
</html>
